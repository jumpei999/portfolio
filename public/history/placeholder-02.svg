  </defs>
  <rect width="400" height="300" fill="url(#sky2)"/>
  <ellipse cx="200" cy="220" rx="220" ry="40" fill="#9a9a9a"/>
  <rect x="60" y="130" width="280" height="90" fill="#707070"/>
  <rect x="80" y="145" width="60" height="60" fill="#555"/>
  <rect x="170" y="145" width="60" height="60" fill="#555"/>
  <rect x="260" y="145" width="60" height="60" fill="#555"/>
  <rect x="120" y="100" width="160" height="35" fill="#484848"/>
  <rect x="0" y="0" width="400" height="300" fill="#000" opacity="0.07" filter="url(#grain2)"/>
</svg>
