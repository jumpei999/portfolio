<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <filter id="grain1">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#sky1)"/>
  <rect x="0" y="200" width="400" height="100" fill="#8a8a8a"/>
  <rect x="30" y="110" width="340" height="90" fill="#6b6b6b"/>
  <rect x="50" y="70" width="40" height="130" fill="#4a4a4a"/>
  <rect x="100" y="50" width="55" height="150" fill="#3d3d3d"/>
  <rect x="165" y="40" width="70" height="160" fill="#333"/>
  <rect x="245" y="55" width="50" height="145" fill="#404040"/>
  <rect x="305" y="75" width="45" height="125" fill="#525252"/>
  <rect x="0" y="0" width="400" height="300" fill="#000" opacity="0.08" filter="url(#grain1)"/>
</svg>
