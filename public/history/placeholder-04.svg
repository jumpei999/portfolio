  </defs>
  <rect width="400" height="300" fill="url(#sky4)"/>
  <rect x="0" y="230" width="400" height="70" fill="#949494"/>
  <rect x="70" y="60" width="260" height="170" fill="#636363" rx="2"/>
  <rect x="90" y="80" width="220" height="130" fill="#4a4a4a"/>
  <rect x="110" y="100" width="180" height="90" fill="#383838"/>
  <circle cx="200" cy="145" r="25" fill="#2a2a2a"/>
  <rect x="0" y="0" width="400" height="300" fill="#000" opacity="0.08" filter="url(#grain4)"/>
